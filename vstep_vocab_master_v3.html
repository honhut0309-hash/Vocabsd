
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--s1:#161920;--s2:#1e2230;--s3:#252a3a;
  --b1:rgba(255,255,255,0.08);--b2:rgba(255,255,255,0.14);
  --tx:#e8eaf0;--tx2:#8b90a4;--tx3:#555a70;
  --gold:#f0c060;--gold2:#d4a030;
  --blue:#4a9eff;--blue-bg:rgba(74,158,255,0.12);--blue-bd:rgba(74,158,255,0.3);
  --green:#48c78e;--green-bg:rgba(72,199,142,0.10);--green-bd:rgba(72,199,142,0.3);
  --red:#f14668;--red-bg:rgba(241,70,104,0.10);--red-bd:rgba(241,70,104,0.3);
  --amber:#ffb347;--amber-bg:rgba(255,179,71,0.10);--amber-bd:rgba(255,179,71,0.3);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,0.10);
  --teal:#2dd4bf;--teal-bg:rgba(45,212,191,0.10);
  --r:12px;--rs:8px;
}
body{font-family:'Be Vietnam Pro',sans-serif,system-ui;background:var(--bg);color:var(--tx);min-height:100vh}
@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap');
.app{max-width:700px;margin:0 auto;padding:1.5rem 1rem 3rem}

/* Header */
.hdr{text-align:center;margin-bottom:1.75rem}
.hdr-title{font-size:24px;font-weight:700;color:var(--tx);margin-bottom:4px}
.hdr-title span{color:var(--gold)}
.hdr-sub{font-size:12px;color:var(--tx3);letter-spacing:.05em}
.pills{display:flex;gap:6px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.hpill{font-size:10px;padding:2px 9px;border-radius:20px;border:.5px solid var(--b2);color:var(--tx3);background:var(--s1)}

/* Tabs */
.tabs{display:flex;background:var(--s1);border:.5px solid var(--b1);border-radius:var(--r);padding:4px;margin-bottom:1.25rem;gap:3px}
.tab{flex:1;padding:8px 6px;border:none;background:transparent;color:var(--tx2);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;border-radius:var(--rs);transition:all .18s;white-space:nowrap}
.tab.on{background:var(--s3);color:var(--gold)}
.tab:hover:not(.on){color:var(--tx);background:var(--s2)}
.panel{display:none}.panel.on{display:block}

/* Stats bar */
.sbar{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.sc{display:flex;align-items:center;gap:5px;padding:4px 10px;background:var(--s1);border:.5px solid var(--b1);border-radius:20px;font-size:11px;font-weight:500;color:var(--tx)}
.sc .l{color:var(--tx3);font-weight:400}
.sc.g{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}
.sc.r{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.sc.gold{background:rgba(240,192,96,.1);border-color:rgba(240,192,96,.2);color:var(--gold)}

/* Progress */
.prog{margin-bottom:1rem}
.prow{display:flex;justify-content:space-between;font-size:11px;color:var(--tx3);margin-bottom:5px}
.ptrack{height:3px;background:var(--s2);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--blue),var(--gold));border-radius:2px;transition:width .4s}

/* Question card */
.qcard{background:var(--s1);border:.5px solid var(--b1);border-radius:var(--r);padding:1.25rem 1.25rem 1rem;margin-bottom:.75rem}
.qbadge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 9px;border-radius:20px;background:var(--blue-bg);color:var(--blue);margin-bottom:10px}
.qbadge.am{background:var(--amber-bg);color:var(--amber)}
.qword{font-size:28px;font-weight:700;color:var(--tx);margin-bottom:3px;line-height:1.2;font-family:'Be Vietnam Pro',sans-serif}
.qpos{font-size:11px;color:var(--tx3);margin-bottom:1.1rem;font-style:italic}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ch{display:flex;align-items:center;gap:9px;padding:10px 12px;border:.5px solid var(--b1);border-radius:var(--rs);cursor:pointer;font-family:inherit;font-size:13px;color:var(--tx);background:var(--s2);transition:all .13s;text-align:left;width:100%}
.ch:hover:not(.dis){border-color:var(--b2);background:var(--s3);transform:translateY(-1px)}
.ch.ok{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}
.ch.ng{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.ch.dis{cursor:default;transform:none}
.ck{width:24px;height:24px;border-radius:6px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--tx2);flex-shrink:0;border:.5px solid var(--b2)}
.ch.ok .ck{background:rgba(72,199,142,.2);color:var(--green);border-color:rgba(72,199,142,.3)}
.ch.ng .ck{background:rgba(241,70,104,.2);color:var(--red);border-color:rgba(241,70,104,.3)}

/* Answer Result Panel */
.ares{margin-top:.9rem;border-radius:var(--rs);overflow:hidden;border:.5px solid var(--b1);display:none}
.ares.show{display:block;animation:fu .25s ease}
.ares-hdr{padding:10px 14px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.ares-hdr.ok{background:rgba(72,199,142,.15);color:var(--green)}
.ares-hdr.ng{background:rgba(241,70,104,.15);color:var(--red)}
.ares-body{background:var(--s2);padding:14px}

/* Synonym pills */
.info-block{margin-bottom:12px}
.info-block:last-child{margin-bottom:0}
.info-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;display:block}
.lbl-an{color:var(--green)}.lbl-sy{color:var(--blue)}.lbl-co{color:var(--amber)}.lbl-pa{color:var(--purple)}.lbl-cl{color:var(--teal)}
.pill-row{display:flex;flex-wrap:wrap;gap:5px}
.syn-pill{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;background:var(--blue-bg);color:var(--blue);border:.5px solid var(--blue-bd)}
.col-pill{padding:4px 10px;border-radius:20px;font-size:12px;font-style:italic;background:var(--amber-bg);color:var(--amber);border:.5px solid var(--amber-bd)}
.para-pill{padding:4px 10px;border-radius:20px;font-size:12px;background:var(--purple-bg);color:var(--purple);border:.5px solid rgba(167,139,250,.3)}
.clause-box{background:var(--s3);border-left:2px solid var(--teal);border-radius:0 6px 6px 0;padding:8px 12px;font-size:13px;font-style:italic;color:var(--tx2);line-height:1.7}
.tip-box{margin-top:10px;background:rgba(240,192,96,.06);border:.5px solid rgba(240,192,96,.2);border-radius:var(--rs);padding:8px 12px;font-size:11px;color:var(--tx2);line-height:1.6}
.tip-box strong{color:var(--gold)}
.an-val{font-size:15px;font-weight:700;color:var(--green)}
.loading-inline{color:var(--tx3);font-size:12px;display:flex;align-items:center;gap:6px}
.sp{display:inline-block;width:12px;height:12px;border:1.5px solid var(--tx3);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}

/* Nav */
.nav{display:flex;gap:8px;align-items:center;margin-top:.6rem}
.btn{padding:8px 18px;border:.5px solid var(--b2);border-radius:var(--rs);background:transparent;font-family:inherit;font-size:12px;font-weight:500;color:var(--tx);cursor:pointer;transition:all .13s}
.btn:hover:not(:disabled){background:var(--s2)}
.btn:disabled{opacity:.3;cursor:default}
.btn.pr{background:var(--gold);color:#0d0f14;border-color:var(--gold);font-weight:700}
.btn.pr:hover{background:#f5cc70}
.btn.gh{border-color:transparent;color:var(--tx2)}
.btn.gh:hover{background:var(--s2);color:var(--tx);border-color:transparent}
.ml{margin-left:auto}
.kbhint{font-size:10px;color:var(--tx3);text-align:center;margin-top:6px}

/* Result */
.result{text-align:center;padding:1.5rem .5rem}
.rscore{font-size:56px;font-weight:700;margin-bottom:5px}
.rmsg{font-size:14px;color:var(--tx2);margin-bottom:1.5rem}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:340px;margin:0 auto 1.5rem}
.rc{background:var(--s1);border:.5px solid var(--b1);border-radius:var(--rs);padding:12px 6px;text-align:center}
.rn{font-size:22px;font-weight:700}.rl{font-size:10px;color:var(--tx3);margin-top:2px}
.mlist{text-align:left;max-width:440px;margin:0 auto 1.25rem;background:var(--s1);border:.5px solid var(--b1);border-radius:var(--rs);padding:12px}
.mt{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.mi{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:.5px solid var(--b1);color:var(--tx)}
.mi:last-child{border-bottom:none}.mv{color:var(--tx2)}
.rbtns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}

/* Flashcard */
.fcmeta{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.fccnt{font-size:12px;color:var(--tx2)}
.fcacts{display:flex;gap:5px}
.fscene{perspective:900px;height:190px;cursor:pointer;margin-bottom:.75rem;-webkit-tap-highlight-color:transparent}
.fccard{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .4s cubic-bezier(.4,0,.2,1)}
.fccard.fl{transform:rotateY(180deg)}
.fcface{position:absolute;inset:0;backface-visibility:hidden;border:.5px solid var(--b1);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.25rem;background:var(--s1)}
.fcback{transform:rotateY(180deg);background:var(--s2);border-color:rgba(240,192,96,.15)}
.fchint{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.fcw{font-size:24px;font-weight:700;color:var(--tx);text-align:center;margin-bottom:3px}
.fcp{font-size:11px;color:var(--tx3);font-style:italic;margin-bottom:6px}
.fctap{font-size:10px;color:var(--tx3);border:.5px solid var(--b1);border-radius:20px;padding:2px 9px;margin-top:6px}
.fcviet{font-size:20px;font-weight:700;color:var(--gold);text-align:center;margin-bottom:5px}
.fcesub{font-size:12px;color:var(--tx2)}
.fcbtns{display:flex;gap:7px;justify-content:center;margin-bottom:.6rem;flex-wrap:wrap}
.bunk{padding:8px 18px;border:.5px solid var(--red-bd);border-radius:var(--rs);background:var(--red-bg);color:var(--red);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer}
.bkn{padding:8px 18px;border:.5px solid var(--green-bd);border-radius:var(--rs);background:var(--green-bg);color:var(--green);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer}
.bunk:hover,.bkn:hover{opacity:.75}
.dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-bottom:.6rem;max-height:55px;overflow:hidden}
.dot{width:7px;height:7px;border-radius:50%;background:var(--s3);border:.5px solid var(--b2);cursor:pointer;flex-shrink:0;transition:all .13s}
.dot.kn{background:var(--green);border-color:var(--green)}
.dot.un{background:var(--red);border-color:var(--red)}
.dot.cu{box-shadow:0 0 0 2px var(--gold)}
.fcleg{display:flex;gap:12px;justify-content:center;font-size:11px;color:var(--tx2);flex-wrap:wrap}
.fcleg span{display:flex;align-items:center;gap:4px}
.ld{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}

/* Review */
.revbanner{background:var(--amber-bg);border:.5px solid var(--amber-bd);border-radius:var(--rs);padding:9px 13px;font-size:12px;font-weight:600;color:var(--amber);margin-bottom:.75rem}
.vinfo{background:var(--s1);border:.5px solid var(--b1);border-radius:var(--rs);padding:8px 12px;font-size:11px;color:var(--tx2);margin-bottom:.75rem;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.vinfo strong{color:var(--gold)}
.loading{text-align:center;padding:3rem 1rem;color:var(--tx2)}
.spinbig{display:inline-block;width:18px;height:18px;border:2px solid var(--s3);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:7px}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--tx2)}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:500px){
  .choices{grid-template-columns:1fr}
  .qword{font-size:22px}
  .tab{font-size:11px;padding:7px 4px}
}
</style>

// ── AI ENRICH (live, via Anthropic API) ──
async function fetchEnrich(word, pos){
  if(cache[word]&&cache[word].synonyms) return;
  const prompt = `You are an expert English vocabulary teacher for Vietnamese VSTEP exam students (B2-C1 level).

For the word/phrase: "${word}" (${pos})
Vietnamese meaning: "${VOCAB.find(v=>v.e===word)?.v||''}"

Return a JSON object with exactly these fields (no extra text, no markdown):
{
  "synonyms": ["synonym1", "synonym2", "synonym3"],
  "paraphrases": ["paraphrase/near-equivalent phrase 1", "paraphrase 2"],
  "collocation": "one natural C1-level collocation using this word",
  "clause": "one complete C1-level example sentence (complex syntax, academic register, IELTS Band 7-8)",
  "tip": "One practical tip in Vietnamese for how to use this word correctly at C1 level vs common mistakes Vietnamese learners make"
}`;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:600, messages:[{role:"user",content:prompt}]})
    });
    const d = await res.json();
    if(!d.content||d.error) throw new Error('API error');
    let txt = d.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(txt);
    cache[word] = parsed;
  } catch(e){
    cache[word] = {synonyms:['—'],paraphrases:['—'],collocation:'—',clause:'—',tip:''};
  }
}

function initQuiz(){
  qWords=sh(VOCAB).slice(0,30);
  qIdx=0;score=0;streak=0;best=0;ans=new Array(30).fill(null);missed=[];
  renderQ();
}

function mkChoices(w){
  return sh([w.v,...sh(VOCAB.filter(v=>v.v!==w.v)).slice(0,3).map(v=>v.v)]);
}

function renderQ(){
  const el = document.getElementById('qmain');
  if(qIdx>=30){renderResult(el);return}
  const w = qWords[qIdx]; const ch = mkChoices(w); const pct = Math.round(qIdx/30*100);
  window._ch=ch; window._w=w;
  el.innerHTML=`
<div class="vinfo"><span>📖</span><strong>${VOCAB.length.toLocaleString()} từ</strong><span>— lấy ngẫu nhiên từ toàn bộ danh sách VSTEP</span></div>
<div class="sbar">
  <div class="sc"><span class="l">Câu</span>${qIdx+1}/30</div>
  <div class="sc"><span class="l">Điểm</span>${score}</div>
  <div class="sc g">Đúng: ${ans.filter(a=>a===true).length}</div>
  <div class="sc r">Sai: ${ans.filter(a=>a===false).length}</div>
  ${streak>=3?`<div class="sc gold">🔥 ${streak} liên tiếp</div>`:''}
</div>
<div class="prog">
  <div class="prow"><span>${pct}% hoàn thành</span><span>${30-qIdx} câu còn lại</span></div>
  <div class="ptrack"><div class="pfill" style="width:${pct}%"></div></div>
</div>
<div class="qcard">
  <div class="qbadge">Nghĩa tiếng Việt là gì?</div>
  <div class="qword">${w.e}</div>
  <div class="qpos">(${w.p})</div>
  <div class="choices" id="choices">
    ${ch.map((c,i)=>`<button class="ch" id="ch${i}" onclick="pick(${i})"><span class="ck">${KEYS[i].toUpperCase()}</span>${c}</button>`).join('')}
  </div>
  <div class="ares" id="ares"></div>
</div>
<div class="nav">
  <button class="btn gh" onclick="skipQ()">Bỏ qua →</button>
  <button class="btn" onclick="prevQ()" ${qIdx===0?'disabled':''} style="margin-left:auto">← Trước</button>
  <button class="btn pr" id="nb" style="display:none" onclick="nextQ()">Tiếp theo →</button>
</div>
<div class="kbhint">Nhấn phím A B C D để trả lời nhanh</div>`;
}

async function pick(idx){
  if(ans[qIdx]!==null)return;
  const ch=window._ch,w=window._w;
  const ok=ch[idx]===w.v;
  ans[qIdx]=ok;
  if(ok){score+=10;streak++;if(streak>best)best=streak;}else{streak=0;missed.push(w);}
  [0,1,2,3].forEach(i=>{
    const b=document.getElementById('ch'+i);if(!b)return;
    b.classList.add('dis');
    if(ch[i]===w.v)b.classList.add('ok');
    else if(i===idx&&!ok)b.classList.add('ng');
  });
  const ares=document.getElementById('ares');
  // Show immediately with loading state
  ares.innerHTML=`<div class="ares-hdr ${ok?'ok':'ng'}">
    ${ok?'✓ Đúng rồi!':'✗ Chưa đúng!'} <span style="font-weight:400;font-size:12px">+${ok?10:0} điểm</span>
    ${ok?'':` <span style="font-size:12px;font-weight:400">→ <strong>${w.v}</strong></span>`}
  </div>
  <div class="ares-body">
    <div class="info-block">
      <span class="info-lbl lbl-an">Nghĩa đúng</span>
      <span class="an-val">${w.v}</span>
    </div>
    <div class="info-block">
      <span class="info-lbl lbl-sy" style="display:flex;align-items:center;gap:8px">
        Từ đồng nghĩa & Paraphrase
        <span style="font-size:9px;background:var(--blue-bg);color:var(--blue);padding:1px 6px;border-radius:20px;border:.5px solid var(--blue-bd)">🤖 AI</span>
      </span>
      <div class="loading-inline"><span class="sp"></span>Đang phân tích từ này...</div>
    </div>
  </div>`;
  ares.classList.add('show');
  document.getElementById('nb').style.display='inline-block';
  // Fetch AI enrich
  await fetchEnrich(w.e, w.p);
  ares.innerHTML = explHTML(w, ok, '');
  ares.classList.add('show');
}

function nextQ(){if(qIdx<29){qIdx++;renderQ();}}
function prevQ(){if(qIdx>0){qIdx--;renderQ();}}
function skipQ(){ans[qIdx]=false;streak=0;missed.push(qWords[qIdx]);if(qIdx<29){qIdx++;renderQ();}}
document.addEventListener('keydown',e=>{
  if(curTab!=='quiz')return;
  const i=KEYS.indexOf(e.key.toLowerCase());
  if(i>=0&&ans[qIdx]===null)pick(i);
});

function renderResult(el){
  const pct=Math.round(score/300*100);
  const col=pct>=70?'var(--green)':pct>=50?'var(--amber)':'var(--red)';
  const msg=pct>=90?'Xuất sắc! Bạn nắm rất vững từ vựng VSTEP!':pct>=70?'Tốt lắm! Hãy ôn lại từ còn sai.':pct>=50?'Cố gắng thêm! Hãy luyện flashcard.':'Hãy ôn tập thêm!';
  const uniq=[...new Map(missed.map(w=>[w.e,w])).values()];
  el.innerHTML=`<div class="result">
    <div class="rscore" style="color:${col}">${score}<span style="font-size:24px;color:var(--tx2)">/300</span></div>
    <div class="rmsg">${msg}</div>
    <div class="rgrid">
      <div class="rc"><div class="rn" style="color:var(--green)">${ans.filter(a=>a===true).length}</div><div class="rl">Câu đúng</div></div>
      <div class="rc"><div class="rn" style="color:var(--red)">${ans.filter(a=>a===false).length}</div><div class="rl">Câu sai</div></div>
      <div class="rc"><div class="rn" style="color:var(--amber)">${best}</div><div class="rl">Streak cao nhất</div></div>
    </div>
    ${uniq.length?`<div class="mlist"><div class="mt">Từ cần ôn (${uniq.length})</div>${uniq.slice(0,10).map(w=>`<div class="mi"><span>${w.e}</span><span class="mv">${w.v}</span></div>`).join('')}</div>`:''}
    <div class="rbtns">
      <button class="btn pr" onclick="initQuiz()">Làm bộ mới</button>
      ${uniq.length?`<button class="btn" onclick="sw('review')">Ôn từ sai →</button>`:''}
      <button class="btn" onclick="sw('flash')">Flashcard →</button>
    </div>
  </div>`;
}

// ── FLASHCARD ──
function initFlash(){fcW=sh(VOCAB);fcI=0;fcF=false;fcKn=new Set();fcUn=new Set();renderFlash();}
function renderFlash(){
  const el=document.getElementById('fmain');
  const w=fcW[fcI];const tot=fcW.length;
  const pct=Math.round((fcKn.size+fcUn.size)/tot*100);
  const showD=Math.min(tot,100);
  const dots=fcW.slice(0,showD).map((_,i)=>`<div class="dot ${fcKn.has(i)?'kn':fcUn.has(i)?'un':''} ${i===fcI?'cu':''}" onclick="fcG(${i})"></div>`).join('');
  el.innerHTML=`
<div class="vinfo"><span>📖</span><strong>${tot.toLocaleString()} từ</strong><span>trong toàn bộ danh sách VSTEP</span></div>
<div class="fcmeta">
  <div class="fccnt">Thẻ ${fcI+1} / ${tot}</div>
  <div class="fcacts">
    <button class="btn" style="font-size:11px;padding:5px 9px" onclick="fcSh()">Xáo thẻ</button>
    <button class="btn" style="font-size:11px;padding:5px 9px" onclick="fcRe()">Làm lại</button>
  </div>
</div>
<div class="ptrack" style="margin-bottom:.6rem"><div class="pfill" style="width:${pct}%"></div></div>
<div class="fscene" onclick="fcFl()">
  <div class="fccard ${fcF?'fl':''}">
    <div class="fcface">
      <div class="fchint">Tiếng Anh — nhấn để lật</div>
      <div class="fcw">${w.e}</div>
      <div class="fcp">(${w.p})</div>
      <div class="fctap">↕ nhấn để xem nghĩa</div>
    </div>
    <div class="fcface fcback">
      <div class="fchint">Tiếng Việt</div>
      <div class="fcviet">${w.v}</div>
      <div class="fcesub">${w.e}</div>
    </div>
  </div>
</div>
<div class="fcbtns">
  <button class="bunk" onclick="fcM('u')">✗ Chưa biết</button>
  <button class="btn" style="font-size:12px;padding:8px 14px" onclick="fcFl()">↕ Lật thẻ</button>
  <button class="bkn" onclick="fcM('k')">✓ Đã biết</button>
</div>
<div style="display:flex;gap:7px;justify-content:center;margin-bottom:.6rem">
  <button class="btn" onclick="fcPr()" ${fcI===0?'disabled':''} style="padding:7px 16px;font-size:12px">←</button>
  <button class="btn" onclick="fcNx()" ${fcI===tot-1?'disabled':''} style="padding:7px 16px;font-size:12px">→</button>
</div>
<div class="dots">${dots}${tot>showD?`<span style="font-size:10px;color:var(--tx3);align-self:center">+${tot-showD}</span>`:''}</div>
<div class="fcleg">
  <span><span class="ld" style="background:var(--green)"></span>Đã biết: ${fcKn.size}</span>
  <span><span class="ld" style="background:var(--red)"></span>Chưa biết: ${fcUn.size}</span>
  <span><span class="ld" style="background:var(--s3);border:.5px solid var(--b2)"></span>Chưa xem: ${tot-fcKn.size-fcUn.size}</span>
</div>
${fcUn.size>0?`<div style="text-align:center;margin-top:.6rem"><button class="btn pr" onclick="fcSU()">Ôn ${fcUn.size} thẻ chưa biết →</button></div>`:''}`;
}
function fcFl(){fcF=!fcF;renderFlash()}
function fcNx(){if(fcI<fcW.length-1){fcI++;fcF=false;renderFlash()}}
function fcPr(){if(fcI>0){fcI--;fcF=false;renderFlash()}}
function fcG(i){fcI=i;fcF=false;renderFlash()}
function fcM(t){if(t==='k'){fcKn.add(fcI);fcUn.delete(fcI);}else{fcUn.add(fcI);fcKn.delete(fcI);}renderFlash();setTimeout(()=>{if(fcI<fcW.length-1){fcI++;fcF=false;renderFlash();}},250);}
function fcSh(){fcW=sh(fcW);fcI=0;fcF=false;fcKn=new Set();fcUn=new Set();renderFlash()}
function fcRe(){fcI=0;fcF=false;fcKn=new Set();fcUn=new Set();renderFlash()}
function fcSU(){const u=[...fcUn].map(i=>fcW[i]);if(!u.length)return;fcW=sh(u);fcI=0;fcF=false;fcKn=new Set();fcUn=new Set();renderFlash();}

// ── REVIEW ──
function initReview(){
  const el=document.getElementById('rmain');
  const pool=missed.length>=4?[...new Map(missed.map(w=>[w.e,w])).values()]:sh(VOCAB).slice(0,15);
  if(pool.length<4){el.innerHTML=`<div class="empty"><div style="font-size:32px;margin-bottom:10px">🎯</div><p>Làm bài trắc nghiệm trước để có từ cần ôn lại!</p><br><button class="btn pr" style="margin-top:10px" onclick="sw('quiz')">Bắt đầu Quiz</button></div>`;return;}
  revW=sh(pool);revI=0;revS=0;revA=new Array(revW.length).fill(null);renderRev();
}
function renderRev(){
  const el=document.getElementById('rmain');
  if(revI>=revW.length){
    const pct=Math.round(revS/revW.length*100);
    el.innerHTML=`<div class="result"><div class="rscore" style="color:${pct>=70?'var(--green)':'var(--amber)'}">${revS}<span style="font-size:24px;color:var(--tx2)">/${revW.length}</span></div><div class="rmsg">${pct>=80?'Bạn đã ôn tốt!':'Hãy ôn thêm và thử lại!'}</div><div class="rbtns"><button class="btn pr" onclick="initReview()">Ôn lại</button><button class="btn" onclick="sw('quiz')">Quay lại Quiz</button></div></div>`;return;
  }
  const w=revW[revI];const ch=mkChoices(w);const pct=Math.round(revI/revW.length*100);
  window._rch=ch;window._rw=w;
  el.innerHTML=`
<div class="revbanner">🔁 Ôn từ sai — ${revI+1}/${revW.length} từ</div>
<div class="sbar"><div class="sc"><span class="l">Câu</span>${revI+1}/${revW.length}</div><div class="sc g">Đúng: ${revS}</div></div>
<div class="ptrack" style="margin-bottom:.75rem"><div class="pfill" style="width:${pct}%;background:var(--amber)"></div></div>
<div class="qcard">
  <div class="qbadge am">Ôn từ sai</div>
  <div class="qword">${w.e}</div>
  <div class="qpos">(${w.p})</div>
  <div class="choices" id="rch">
    ${ch.map((c,i)=>`<button class="ch" id="rc${i}" onclick="revPick(${i})"><span class="ck">${KEYS[i].toUpperCase()}</span>${c}</button>`).join('')}
  </div>
  <div class="ares" id="rares"></div>
</div>
<div class="nav"><button class="btn pr ml" id="rnb" style="display:none" onclick="revI++;renderRev()">Tiếp theo →</button></div>`;
}

async function revPick(idx){
  if(revA[revI]!==null)return;
  const ch=window._rch,w=window._rw;
  const ok=ch[idx]===w.v;
  revA[revI]=ok;if(ok)revS++;
  [0,1,2,3].forEach(i=>{const b=document.getElementById('rc'+i);if(!b)return;b.classList.add('dis');if(ch[i]===w.v)b.classList.add('ok');else if(i===idx&&!ok)b.classList.add('ng');});
  const ares=document.getElementById('rares');
  ares.innerHTML=`<div class="ares-hdr ${ok?'ok':'ng'}">${ok?'✓ Chính xác!':'✗ Chưa đúng!'}</div><div class="ares-body"><div class="loading-inline"><span class="sp"></span>Đang tải...</div></div>`;
  ares.classList.add('show');
  document.getElementById('rnb').style.display='inline-block';
  await fetchEnrich(w.e, w.p);
  ares.innerHTML = explHTML(w, ok, '');
  ares.classList.add('show');
}

initQuiz();
</script>
